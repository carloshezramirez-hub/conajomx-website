<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" width="160" height="80">
  <defs>
    <linearGradient id="a06bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2D52"/>
      <stop offset="60%" stop-color="#071D3A"/>
      <stop offset="100%" stop-color="#0D3560"/>
    </linearGradient>
    <radialGradient id="a06glow" cx="75%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#1FE9E1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#071D3A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="160" height="80" rx="6" fill="url(#a06bg)"/>
  <rect width="160" height="80" rx="6" fill="url(#a06glow)"/>

  <!-- Abstract icon: ascending bar chart (growth/enterprise) -->
  <rect x="10" y="55" width="6" height="16" fill="#1FE9E1" opacity="0.4" rx="1"/>
  <rect x="18" y="46" width="6" height="25" fill="#1FE9E1" opacity="0.55" rx="1"/>
  <rect x="26" y="36" width="6" height="35" fill="#1FE9E1" opacity="0.7" rx="1"/>
  <rect x="34" y="28" width="6" height="43" fill="#1FE9E1" opacity="0.9" rx="1"/>
  <!-- Rising arrow at top of bars -->
  <polyline points="13,53 21,44 29,34 37,26" fill="none" stroke="#1FE9E1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <polygon points="37,26 42,26 37,21" fill="#1FE9E1" opacity="0.7"/>

  <!-- Separator -->
  <line x1="50" y1="15" x2="50" y2="65" stroke="#1FE9E1" stroke-width="0.5" opacity="0.2"/>

  <!-- Wordmark -->
  <text x="107" y="31" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="14" fill="white" text-anchor="middle" letter-spacing="0.3">Pro</text>
  <text x="130" y="31" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="14" fill="#1FE9E1" text-anchor="middle">Empresa</text>
  <!-- Sub label -->
  <text x="107" y="48" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="7" fill="white" text-anchor="middle" letter-spacing="1.5" opacity="0.5">GROWTH · NEGOCIOS</text>

  <!-- Bottom accent -->
  <rect x="0" y="76" width="160" height="4" fill="#1FE9E1" opacity="0.2" rx="0"/>
  <rect x="0" y="77" width="50" height="3" fill="#1FE9E1" opacity="0.5"/>
</svg>
