<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" width="160" height="80">
  <defs>
    <linearGradient id="a02bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2D52"/>
      <stop offset="50%" stop-color="#0D3A6A"/>
      <stop offset="100%" stop-color="#1FE9E1" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="a02accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1FE9E1"/>
      <stop offset="100%" stop-color="#0fc8c0"/>
    </linearGradient>
  </defs>

  <rect width="160" height="80" rx="6" fill="url(#a02bg)"/>

  <!-- Diagonal accent stripe -->
  <polygon points="110,0 160,0 160,80 130,80" fill="#1FE9E1" opacity="0.08"/>

  <!-- Arrow/impulse icon (upward arrow) -->
  <polygon points="18,44 26,26 34,44" fill="none" stroke="url(#a02accent)" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="26" y1="26" x2="26" y2="54" stroke="url(#a02accent)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Horizontal accent bar at top -->
  <rect x="0" y="0" width="160" height="4" fill="url(#a02accent)" rx="0" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="95" y="32" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="15" fill="white" text-anchor="middle" letter-spacing="0.5">Impulsa</text>
  <text x="130" y="32" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="15" fill="#1FE9E1" text-anchor="middle" letter-spacing="0.5">MX</text>
  <!-- Sub label -->
  <text x="95" y="50" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="7.5" fill="white" text-anchor="middle" letter-spacing="1.5" opacity="0.55">DESARROLLO · IMPACTO</text>
</svg>
