<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" width="160" height="80">
  <defs>
    <linearGradient id="a04bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5FAFF"/>
      <stop offset="100%" stop-color="#EEF3FB"/>
    </linearGradient>
    <linearGradient id="a04mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071D3A"/>
      <stop offset="100%" stop-color="#0A2D52"/>
    </linearGradient>
  </defs>

  <rect width="160" height="80" rx="6" fill="url(#a04bg)"/>

  <!-- Border outline -->
  <rect x="1" y="1" width="158" height="78" rx="5.5" fill="none" stroke="#071D3A" stroke-width="1" opacity="0.12"/>

  <!-- Geometric mark: interlocking diamond shapes -->
  <polygon points="22,14 30,22 22,30 14,22" fill="url(#a04mark)" opacity="0.85"/>
  <polygon points="22,22 30,30 22,38 14,30" fill="none" stroke="#1FE9E1" stroke-width="1.2" opacity="0.7"/>
  <polygon points="22,18 26,22 22,26 18,22" fill="#1FE9E1" opacity="0.6"/>

  <!-- Alianza underline mark -->
  <rect x="12" y="42" width="20" height="2" fill="#1FE9E1" rx="1" opacity="0.6"/>
  <rect x="12" y="46" width="12" height="1.5" fill="#071D3A" rx="1" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="98" y="29" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="12" fill="#071D3A" text-anchor="middle" letter-spacing="0.3">Alianza</text>
  <text x="98" y="45" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="14" fill="#071D3A" text-anchor="middle" letter-spacing="1">CNEM</text>
  <!-- Sub label -->
  <text x="98" y="60" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="7" fill="#526173" text-anchor="middle" letter-spacing="1.5">CONSEJO · EMPRESARIOS</text>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="160" height="3" fill="#1FE9E1" rx="0" opacity="0.4"/>
</svg>
