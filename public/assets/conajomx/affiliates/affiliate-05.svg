<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" width="160" height="80">
  <defs>
    <linearGradient id="a05bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071D3A"/>
      <stop offset="100%" stop-color="#0A2D52"/>
    </linearGradient>
    <linearGradient id="a05teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1FE9E1"/>
      <stop offset="100%" stop-color="#0fc8c0"/>
    </linearGradient>
  </defs>

  <rect width="160" height="80" rx="6" fill="url(#a05bg)"/>

  <!-- Teal accent: diagonal stripe -->
  <polygon points="0,0 50,0 0,50" fill="#1FE9E1" opacity="0.07"/>

  <!-- Link/chain icon: two overlapping rings -->
  <ellipse cx="16" cy="33" rx="9" ry="6" fill="none" stroke="url(#a05teal)" stroke-width="2" opacity="0.9" transform="rotate(-30 16 33)"/>
  <ellipse cx="28" cy="39" rx="9" ry="6" fill="none" stroke="url(#a05teal)" stroke-width="2" opacity="0.7" transform="rotate(-30 28 39)"/>
  <!-- Center overlap fill -->
  <ellipse cx="22" cy="36" rx="4" ry="3" fill="#0A2D52" transform="rotate(-30 22 36)"/>
  <ellipse cx="22" cy="36" rx="2" ry="1.5" fill="#1FE9E1" opacity="0.5" transform="rotate(-30 22 36)"/>

  <!-- Teal bottom accent bar -->
  <rect x="0" y="70" width="160" height="10" fill="url(#a05teal)" opacity="0.15" rx="0"/>
  <rect x="0" y="73" width="70" height="4" fill="url(#a05teal)" opacity="0.7" rx="0"/>

  <!-- Wordmark -->
  <text x="100" y="30" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="13" fill="white" text-anchor="middle" letter-spacing="0.5">Vínculo</text>
  <text x="140" y="30" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="13" fill="#1FE9E1" text-anchor="middle" letter-spacing="0.5">MX</text>
  <!-- Sub label -->
  <text x="107" y="48" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="7" fill="white" text-anchor="middle" letter-spacing="1.5" opacity="0.5">CONEXIÓN · ALIANZAS</text>
</svg>
