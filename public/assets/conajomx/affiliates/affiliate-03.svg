<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" width="160" height="80">
  <defs>
    <linearGradient id="a03bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071D3A"/>
      <stop offset="100%" stop-color="#091E36"/>
    </linearGradient>
  </defs>

  <rect width="160" height="80" rx="6" fill="url(#a03bg)"/>

  <!-- Cyan accent bar (thick, left edge) -->
  <rect x="0" y="0" width="6" height="80" fill="#1FE9E1" rx="0" opacity="0.9"/>

  <!-- Network/connect icon: two circles with line -->
  <circle cx="22" cy="26" r="7" fill="none" stroke="#1FE9E1" stroke-width="1.5" opacity="0.8"/>
  <circle cx="22" cy="26" r="2.5" fill="#1FE9E1" opacity="0.9"/>
  <circle cx="22" cy="52" r="5" fill="none" stroke="#1FE9E1" stroke-width="1" opacity="0.5"/>
  <circle cx="22" cy="52" r="2" fill="#1FE9E1" opacity="0.6"/>
  <line x1="22" y1="33" x2="22" y2="47" stroke="#1FE9E1" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>

  <!-- Dot grid subtle -->
  <circle cx="42" cy="18" r="0.8" fill="#1FE9E1" opacity="0.2"/>
  <circle cx="52" cy="18" r="0.8" fill="#1FE9E1" opacity="0.2"/>
  <circle cx="42" cy="28" r="0.8" fill="#1FE9E1" opacity="0.2"/>

  <!-- Wordmark -->
  <text x="100" y="30" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="13" fill="white" text-anchor="middle" letter-spacing="0.5">Connect</text>
  <text x="138" y="30" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="13" fill="#1FE9E1" text-anchor="middle" letter-spacing="0.5">Mex</text>
  <!-- Sub label -->
  <text x="100" y="48" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="7" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.5">REDES · VINCULACIÓN</text>

  <!-- Bottom cyan line -->
  <rect x="6" y="74" width="100" height="2" fill="#1FE9E1" opacity="0.4" rx="1"/>
</svg>
