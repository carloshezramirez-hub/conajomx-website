<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bgN02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5FAFF"/>
      <stop offset="100%" stop-color="#EEF3FB"/>
    </linearGradient>
    <linearGradient id="mxCircle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071D3A"/>
      <stop offset="100%" stop-color="#0A2D52"/>
    </linearGradient>
    <linearGradient id="esCircle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2D52"/>
      <stop offset="100%" stop-color="#1158A0"/>
    </linearGradient>
    <pattern id="dotGrid02" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#071D3A" opacity="0.07"/>
    </pattern>
    <filter id="circShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#071D3A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="400" height="280" fill="url(#bgN02)"/>
  <rect width="400" height="280" fill="url(#dotGrid02)"/>

  <!-- Subtle background arcs -->
  <circle cx="200" cy="130" r="120" fill="none" stroke="#071D3A" stroke-width="0.5" opacity="0.05"/>
  <circle cx="200" cy="130" r="95" fill="none" stroke="#1FE9E1" stroke-width="0.5" opacity="0.08"/>

  <!-- Venn left circle (Mexico) -->
  <circle cx="158" cy="130" r="72" fill="url(#mxCircle)" opacity="0.88" filter="url(#circShadow)"/>
  <!-- Venn right circle (Spain) -->
  <circle cx="242" cy="130" r="72" fill="url(#esCircle)" opacity="0.82" filter="url(#circShadow)"/>

  <!-- Intersection area -->
  <path d="M200,65 A72,72 0 0,1 200,195 A72,72 0 0,1 200,65Z" fill="#1FE9E1" opacity="0.18"/>
  <path d="M200,68 A70,70 0 0,1 200,192 A70,70 0 0,1 200,68Z" fill="none" stroke="#1FE9E1" stroke-width="1" opacity="0.4"/>

  <!-- MX text in left circle -->
  <text x="145" y="125" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="22" fill="white" text-anchor="middle" opacity="0.95">MX</text>
  <text x="145" y="143" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="8" fill="white" text-anchor="middle" opacity="0.7" letter-spacing="1">MÉXICO</text>

  <!-- ES text in right circle -->
  <text x="255" y="125" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="22" fill="white" text-anchor="middle" opacity="0.95">ES</text>
  <text x="255" y="143" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="8" fill="white" text-anchor="middle" opacity="0.7" letter-spacing="1">ESPAÑA</text>

  <!-- Center intersection symbol -->
  <text x="200" y="127" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="11" fill="#1FE9E1" text-anchor="middle">∞</text>

  <!-- Mexico flag bars (small, left side below) -->
  <rect x="80" y="218" width="8" height="22" fill="#006847" rx="1"/>
  <rect x="90" y="218" width="8" height="22" fill="white" rx="1"/>
  <rect x="100" y="218" width="8" height="22" fill="#CE1126" rx="1"/>

  <!-- Spain flag bars (small, right side below) -->
  <rect x="292" y="216" width="8" height="8" fill="#c60b1e" rx="1"/>
  <rect x="302" y="216" width="8" height="8" fill="#c60b1e" rx="1"/>
  <rect x="292" y="226" width="8" height="12" fill="#ffc400" rx="1"/>
  <rect x="302" y="226" width="8" height="12" fill="#ffc400" rx="1"/>
  <rect x="292" y="240" width="8" height="8" fill="#c60b1e" rx="1"/>
  <rect x="302" y="240" width="8" height="8" fill="#c60b1e" rx="1"/>

  <!-- Caption bottom -->
  <text x="200" y="248" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="14" fill="#071D3A" text-anchor="middle" letter-spacing="0.5">Cooperación Bilateral</text>
  <text x="200" y="264" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="9" fill="#526173" text-anchor="middle" letter-spacing="2">ALIANZA ESTRATÉGICA · CONAJOMX</text>

  <!-- Top accent line -->
  <rect x="160" y="14" width="80" height="2" fill="#1FE9E1" rx="1" opacity="0.5"/>

  <!-- Bottom accent -->
  <rect x="140" y="274" width="120" height="2" fill="#1FE9E1" rx="1" opacity="0.4"/>
</svg>
