<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071D3A"/>
      <stop offset="100%" stop-color="#0A2D52"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1FE9E1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1FE9E1" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1FE9E1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#071D3A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="hexPattern01" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <polygon points="30,2 56,16 56,44 30,58 4,44 4,16" fill="none" stroke="#1FE9E1" stroke-width="0.4" opacity="0.12"/>
    </pattern>
    <filter id="glow01">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad01)"/>
  <!-- Hex pattern overlay -->
  <rect width="800" height="600" fill="url(#hexPattern01)"/>

  <!-- Globe glow -->
  <ellipse cx="400" cy="290" rx="230" ry="230" fill="url(#globeGlow)"/>

  <!-- Globe circle -->
  <circle cx="400" cy="290" r="180" fill="none" stroke="#1FE9E1" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="290" r="180" fill="#0A2D52" opacity="0.2"/>

  <!-- Meridian lines -->
  <ellipse cx="400" cy="290" rx="60" ry="180" fill="none" stroke="#1FE9E1" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="400" cy="290" rx="120" ry="180" fill="none" stroke="#1FE9E1" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="400" cy="290" rx="160" ry="180" fill="none" stroke="#1FE9E1" stroke-width="0.6" opacity="0.15"/>

  <!-- Parallel lines (latitude) -->
  <line x1="222" y1="220" x2="578" y2="220" stroke="#1FE9E1" stroke-width="0.6" opacity="0.2"/>
  <line x1="222" y1="290" x2="578" y2="290" stroke="#1FE9E1" stroke-width="0.8" opacity="0.3"/>
  <line x1="222" y1="360" x2="578" y2="360" stroke="#1FE9E1" stroke-width="0.6" opacity="0.2"/>
  <line x1="230" y1="180" x2="570" y2="180" stroke="#1FE9E1" stroke-width="0.4" opacity="0.15"/>
  <line x1="230" y1="400" x2="570" y2="400" stroke="#1FE9E1" stroke-width="0.4" opacity="0.15"/>

  <!-- Network nodes -->
  <circle cx="400" cy="290" r="5" fill="#1FE9E1" filter="url(#glow01)"/>
  <circle cx="480" cy="220" r="4" fill="#1FE9E1" opacity="0.9" filter="url(#glow01)"/>
  <circle cx="320" cy="250" r="3.5" fill="#1FE9E1" opacity="0.8"/>
  <circle cx="540" cy="310" r="3" fill="#1FE9E1" opacity="0.7"/>
  <circle cx="310" cy="360" r="4" fill="#1FE9E1" opacity="0.85" filter="url(#glow01)"/>
  <circle cx="450" cy="380" r="3" fill="#1FE9E1" opacity="0.7"/>
  <circle cx="360" cy="170" r="3.5" fill="#1FE9E1" opacity="0.8"/>
  <circle cx="500" cy="160" r="2.5" fill="#1FE9E1" opacity="0.6"/>
  <circle cx="260" cy="300" r="3" fill="#1FE9E1" opacity="0.65"/>
  <circle cx="570" cy="250" r="2.5" fill="#1FE9E1" opacity="0.6"/>

  <!-- Network lines -->
  <line x1="400" y1="290" x2="480" y2="220" stroke="#1FE9E1" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="290" x2="320" y2="250" stroke="#1FE9E1" stroke-width="1" opacity="0.45"/>
  <line x1="400" y1="290" x2="540" y2="310" stroke="#1FE9E1" stroke-width="0.8" opacity="0.4"/>
  <line x1="400" y1="290" x2="310" y2="360" stroke="#1FE9E1" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="290" x2="450" y2="380" stroke="#1FE9E1" stroke-width="0.8" opacity="0.4"/>
  <line x1="400" y1="290" x2="360" y2="170" stroke="#1FE9E1" stroke-width="0.8" opacity="0.4"/>
  <line x1="480" y1="220" x2="360" y2="170" stroke="#1FE9E1" stroke-width="0.6" opacity="0.3"/>
  <line x1="480" y1="220" x2="570" y2="250" stroke="#1FE9E1" stroke-width="0.6" opacity="0.3"/>
  <line x1="320" y1="250" x2="260" y2="300" stroke="#1FE9E1" stroke-width="0.6" opacity="0.3"/>
  <line x1="310" y1="360" x2="450" y2="380" stroke="#1FE9E1" stroke-width="0.6" opacity="0.3"/>
  <line x1="360" y1="170" x2="500" y2="160" stroke="#1FE9E1" stroke-width="0.5" opacity="0.25"/>

  <!-- Floating dots scattered -->
  <circle cx="150" cy="100" r="2" fill="#1FE9E1" opacity="0.3"/>
  <circle cx="680" cy="80" r="1.5" fill="#1FE9E1" opacity="0.25"/>
  <circle cx="720" cy="450" r="2" fill="#1FE9E1" opacity="0.3"/>
  <circle cx="90" cy="400" r="1.5" fill="#1FE9E1" opacity="0.2"/>
  <circle cx="650" cy="540" r="2" fill="#1FE9E1" opacity="0.25"/>
  <circle cx="120" cy="520" r="1.5" fill="#1FE9E1" opacity="0.2"/>
  <circle cx="740" cy="180" r="2" fill="#1FE9E1" opacity="0.3"/>
  <circle cx="60" cy="200" r="1.5" fill="#1FE9E1" opacity="0.2"/>

  <!-- Title text -->
  <text x="400" y="530" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="28" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.9">AGENDA INTERNACIONAL</text>
  <text x="400" y="555" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="13" fill="#1FE9E1" text-anchor="middle" letter-spacing="3" opacity="0.8">G7 · G20 · ONU · WEF · OCDE</text>

  <!-- Cyan accent lines flanking title -->
  <line x1="50" y1="530" x2="280" y2="530" stroke="#1FE9E1" stroke-width="1" opacity="0.3"/>
  <line x1="520" y1="530" x2="750" y2="530" stroke="#1FE9E1" stroke-width="1" opacity="0.3"/>

  <!-- CONAJOMX watermark bottom left -->
  <text x="24" y="585" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="10" fill="white" opacity="0.35" letter-spacing="2">CONAJOMX</text>

  <!-- Top right corner tag -->
  <rect x="660" y="20" width="120" height="28" fill="none" stroke="#1FE9E1" stroke-width="0.8" opacity="0.3" rx="2"/>
  <text x="720" y="38" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="9" fill="#1FE9E1" text-anchor="middle" opacity="0.7" letter-spacing="1">GLOBAL NETWORK</text>
</svg>
