  <rect x="231" y="270" width="8"   height="8"   fill="#1FE9E1" opacity="0.6"/>
  <rect x="244" y="270" width="8"   height="8"   fill="#1FE9E1" opacity="0.7"/>
  <rect x="258" y="270" width="8"   height="8"   fill="#1FE9E1" opacity="0.5"/>
  <rect x="218" y="285" width="8"   height="8"   fill="#1FE9E1" opacity="0.5"/>
  <rect x="231" y="285" width="8"   height="8"   fill="#1FE9E1" opacity="0.4"/>
  <rect x="244" y="285" width="8"   height="8"   fill="#1FE9E1" opacity="0.6"/>
  <rect x="258" y="285" width="8"   height="8"   fill="#1FE9E1" opacity="0.8"/>
  <rect x="218" y="300" width="8"   height="8"   fill="#1FE9E1" opacity="0.7"/>
  <rect x="231" y="300" width="8"   height="8"   fill="#1FE9E1" opacity="0.5"/>
  <rect x="244" y="300" width="8"   height="8"   fill="#1FE9E1" opacity="0.4"/>
  <rect x="258" y="300" width="8"   height="8"   fill="#1FE9E1" opacity="0.6"/>

