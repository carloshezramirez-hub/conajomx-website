  <rect x="119" y="315" width="6"   height="6"   fill="#1FE9E1" opacity="0.5"/>
  <rect x="109" y="328" width="6"   height="6"   fill="#1FE9E1" opacity="0.4"/>
  <rect x="119" y="328" width="6"   height="6"   fill="#1FE9E1" opacity="0.6"/>
  <rect x="109" y="341" width="6"   height="6"   fill="#1FE9E1" opacity="0.5"/>
  <rect x="160" y="382" width="6"   height="6"   fill="#1FE9E1" opacity="0.4"/>
  <rect x="170" y="382" width="6"   height="6"   fill="#1FE9E1" opacity="0.6"/>
  <rect x="160" y="395" width="6"   height="6"   fill="#1FE9E1" opacity="0.5"/>

