  <rect x="425" y="380" width="6"   height="6"   fill="#1FE9E1" opacity="0.5"/>
  <rect x="434" y="380" width="6"   height="6"   fill="#1FE9E1" opacity="0.7"/>
  <rect x="425" y="393" width="6"   height="6"   fill="#1FE9E1" opacity="0.6"/>
