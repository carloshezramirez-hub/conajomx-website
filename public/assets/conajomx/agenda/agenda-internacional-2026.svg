<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1f3d"/>
      <stop offset="60%" stop-color="#0d2d52"/>
      <stop offset="100%" stop-color="#071D3A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1FE9E1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1FE9E1" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cityGlow" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#1FE9E1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1FE9E1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="globeGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a4a7a"/>
      <stop offset="100%" stop-color="#071D3A"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#sky)"/>
  <rect width="900" height="600" fill="url(#cityGlow)"/>

  <!-- Stars -->
  <circle cx="80"  cy="40"  r="1.2" fill="white" opacity="0.6"/>
  <circle cx="210" cy="25"  r="0.8" fill="white" opacity="0.5"/>
  <circle cx="340" cy="55"  r="1"   fill="white" opacity="0.7"/>
  <circle cx="520" cy="20"  r="0.9" fill="white" opacity="0.5"/>
  <circle cx="670" cy="45"  r="1.2" fill="white" opacity="0.6"/>
  <circle cx="800" cy="30"  r="0.8" fill="white" opacity="0.4"/>
  <circle cx="150" cy="90"  r="0.7" fill="white" opacity="0.5"/>
  <circle cx="750" cy="80"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="440" cy="70"  r="0.8" fill="white" opacity="0.4"/>

  <!-- Globe circle -->
  <circle cx="700" cy="220" r="140" fill="url(#globeGrad)" opacity="0.9"/>
  <circle cx="700" cy="220" r="140" fill="none" stroke="#1FE9E1" stroke-width="1.5" opacity="0.4"/>

  <!-- Globe meridians -->
  <ellipse cx="700" cy="220" rx="70"  ry="140" fill="none" stroke="#1FE9E1" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="700" cy="220" rx="120" ry="140" fill="none" stroke="#1FE9E1" stroke-width="0.8" opacity="0.2"/>
  <!-- Globe parallels -->
  <ellipse cx="700" cy="175" rx="135" ry="28" fill="none" stroke="#1FE9E1" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="700" cy="220" rx="140" ry="22" fill="none" stroke="#1FE9E1" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="700" cy="265" rx="135" ry="28" fill="none" stroke="#1FE9E1" stroke-width="0.8" opacity="0.2"/>

  <!-- Globe glow halo -->
  <circle cx="700" cy="220" r="160" fill="none" stroke="#1FE9E1" stroke-width="1" opacity="0.08"/>
  <circle cx="700" cy="220" r="180" fill="none" stroke="#1FE9E1" stroke-width="0.5" opacity="0.05"/>

  <!-- Location pins on globe -->
  <circle cx="645" cy="200" r="5" fill="#1FE9E1" opacity="0.9"/>
  <circle cx="645" cy="200" r="9" fill="none" stroke="#1FE9E1" stroke-width="1" opacity="0.4"/>
  <circle cx="720" cy="180" r="4" fill="#1FE9E1" opacity="0.8"/>
  <circle cx="760" cy="230" r="4" fill="#1FE9E1" opacity="0.8"/>
  <circle cx="700" cy="255" r="3.5" fill="#1FE9E1" opacity="0.7"/>

