  <rect x="10"  y="380" width="25"  height="220" fill="#0a1f3a"/>
  <rect x="45"  y="440" width="35"  height="160" fill="#0d2442"/>
  <rect x="55"  y="410" width="20"  height="190" fill="#0a1f3a"/>
