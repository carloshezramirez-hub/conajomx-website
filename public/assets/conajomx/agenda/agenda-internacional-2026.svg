  <rect x="323" y="320" width="6"   height="6"   fill="#1FE9E1" opacity="0.7"/>
  <rect x="315" y="332" width="6"   height="6"   fill="#1FE9E1" opacity="0.6"/>
  <rect x="323" y="332" width="6"   height="6"   fill="#1FE9E1" opacity="0.4"/>
  <rect x="365" y="348" width="6"   height="6"   fill="#1FE9E1" opacity="0.6"/>
