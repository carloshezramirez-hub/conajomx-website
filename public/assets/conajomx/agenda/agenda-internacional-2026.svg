  <line x1="720" y1="180" x2="760" y2="230" stroke="#1FE9E1" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>
  <line x1="645" y1="200" x2="700" y2="255" stroke="#1FE9E1" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>

