  <rect x="24"  y="395" width="5"   height="5"   fill="#1FE9E1" opacity="0.5"/>
  <rect x="59"  y="420" width="5"   height="5"   fill="#1FE9E1" opacity="0.5"/>
  <rect x="59"  y="433" width="5"   height="5"   fill="#1FE9E1" opacity="0.3"/>
  <rect x="68"  y="420" width="5"   height="5"   fill="#1FE9E1" opacity="0.6"/>

