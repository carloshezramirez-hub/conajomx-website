  <rect x="405" y="390" width="60"  height="210" fill="#0d2442"/>
  <rect x="420" y="370" width="35"  height="230" fill="#0a1f3a"/>
  <rect x="475" y="400" width="50"  height="200" fill="#0e2640"/>
  <rect x="490" y="375" width="28"  height="225" fill="#0b2138"/>
