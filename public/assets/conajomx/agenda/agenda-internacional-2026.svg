  <rect x="503" y="385" width="6"   height="6"   fill="#1FE9E1" opacity="0.6"/>

  <!-- Far right buildings -->
  <rect x="535" y="410" width="45"  height="190" fill="#0d2442"/>
  <rect x="548" y="395" width="22"  height="205" fill="#0a1f3a"/>
  <rect x="590" y="430" width="50"  height="170" fill="#0e2640"/>

  <!-- Ground reflection line -->
  <rect x="0" y="530" width="900" height="2" fill="#1FE9E1" opacity="0.15"/>
  <!-- Ground -->
  <rect x="0" y="532" width="900" height="68" fill="#060f1e"/>

  <!-- Reflection in ground -->
  <rect x="0" y="532" width="900" height="68" fill="url(#sky)" opacity="0.3"/>

  <!-- Bottom gradient overlay for text readability -->
  <defs>
    <linearGradient id="textBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#071D3A" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect x="0" y="400" width="900" height="200" fill="url(#textBg)"/>

  <!-- Text labels -->
  <text x="36" y="490" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="26" font-weight="800" fill="white" letter-spacing="1">Agenda Internacional CONAJOMX 2026</text>
  <text x="36" y="516" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.65)" letter-spacing="2">10 EVENTOS  ·  6 PAÍSES  ·  G7  ·  G20  ·  OCDE  ·  HARVARD  ·  COP31</text>

  <!-- Cyan accent bar bottom -->
  <rect x="0" y="592" width="900" height="8" fill="#1FE9E1" opacity="0.75"/>
