<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="leftBg04" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#071D3A"/>
      <stop offset="100%" stop-color="#0A2D52"/>
    </linearGradient>
    <linearGradient id="rightBg04" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A2D52"/>
      <stop offset="100%" stop-color="#0D3560"/>
    </linearGradient>
    <linearGradient id="arcGrad04" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1FE9E1"/>
      <stop offset="50%" stop-color="white"/>
      <stop offset="100%" stop-color="#1FE9E1"/>
    </linearGradient>
    <filter id="glow04">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dotsPat04" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="white" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Left half (navy) -->
  <rect x="0" y="0" width="300" height="400" fill="url(#leftBg04)"/>
  <!-- Right half (slightly lighter navy) -->
  <rect x="300" y="0" width="300" height="400" fill="url(#rightBg04)"/>

  <!-- Dot pattern overlay -->
  <rect width="600" height="400" fill="url(#dotsPat04)"/>

  <!-- Center divider line -->
  <line x1="300" y1="0" x2="300" y2="400" stroke="white" stroke-width="0.5" opacity="0.15"/>

  <!-- Mexico flag stripes (left side, bottom) -->
  <rect x="0" y="360" width="100" height="13" fill="#006847"/>
  <rect x="100" y="360" width="100" height="13" fill="white" opacity="0.9"/>
  <rect x="200" y="360" width="100" height="13" fill="#CE1126"/>

  <!-- Spain flag stripes (right side, bottom) -->
  <rect x="300" y="355" width="100" height="8" fill="#c60b1e"/>
  <rect x="400" y="355" width="100" height="8" fill="#c60b1e"/>
  <rect x="300" y="363" width="100" height="14" fill="#ffc400"/>
  <rect x="400" y="363" width="100" height="14" fill="#ffc400"/>
  <rect x="300" y="377" width="100" height="8" fill="#c60b1e"/>
  <rect x="400" y="377" width="100" height="8" fill="#c60b1e"/>

  <!-- Mexico text on left -->
  <text x="150" y="145" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="28" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.9">MX</text>
  <text x="150" y="170" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="11" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.6">MÉXICO</text>

  <!-- Spain text on right -->
  <text x="450" y="145" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="28" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.9">ES</text>
  <text x="450" y="170" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="11" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.6">ESPAÑA</text>

  <!-- Connection arc top -->
  <path d="M150,190 Q300,60 450,190" fill="none" stroke="url(#arcGrad04)" stroke-width="2" opacity="0.7"/>

  <!-- Arc dots -->
  <circle cx="190" cy="140" r="4" fill="#1FE9E1" opacity="0.85" filter="url(#glow04)"/>
  <circle cx="240" cy="105" r="3.5" fill="white" opacity="0.8" filter="url(#glow04)"/>
  <circle cx="300" cy="88" r="6" fill="#1FE9E1" filter="url(#glow04)"/>
  <circle cx="300" cy="88" r="12" fill="none" stroke="#1FE9E1" stroke-width="1" opacity="0.4"/>
  <circle cx="360" cy="105" r="3.5" fill="white" opacity="0.8" filter="url(#glow04)"/>
  <circle cx="410" cy="140" r="4" fill="#1FE9E1" opacity="0.85" filter="url(#glow04)"/>

  <!-- Origin dots -->
  <circle cx="150" cy="190" r="6" fill="#1FE9E1" filter="url(#glow04)"/>
  <circle cx="150" cy="190" r="12" fill="none" stroke="#1FE9E1" stroke-width="1" opacity="0.4"/>
  <circle cx="450" cy="190" r="6" fill="#1FE9E1" filter="url(#glow04)"/>
  <circle cx="450" cy="190" r="12" fill="none" stroke="#1FE9E1" stroke-width="1" opacity="0.4"/>

  <!-- Center title -->
  <text x="300" y="260" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="22" fill="white" text-anchor="middle" letter-spacing="1" opacity="0.95">México · España</text>
  <text x="300" y="282" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="10" fill="#1FE9E1" text-anchor="middle" letter-spacing="3" opacity="0.8">COOPERACIÓN BILATERAL</text>

  <!-- Thin separator lines -->
  <line x1="80" y1="270" x2="218" y2="270" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <line x1="382" y1="270" x2="520" y2="270" stroke="white" stroke-width="0.5" opacity="0.2"/>

  <!-- CONAJOMX small -->
  <text x="300" y="347" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="9" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.4">CONAJOMX</text>
</svg>
