<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgG02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071D3A"/>
      <stop offset="60%" stop-color="#0A2D52"/>
      <stop offset="100%" stop-color="#071D3A"/>
    </linearGradient>
    <radialGradient id="globeGlow02" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1FE9E1" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#0A2D52" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#071D3A" stop-opacity="0"/>
    </radialGradient>
    <filter id="pinGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="globeClip">
      <circle cx="300" cy="190" r="148"/>
    </clipPath>
  </defs>

  <rect width="600" height="400" fill="url(#bgG02)"/>

  <!-- Star field -->
  <circle cx="45" cy="30" r="1" fill="white" opacity="0.5"/>
  <circle cx="120" cy="15" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="200" cy="45" r="1" fill="white" opacity="0.35"/>
  <circle cx="310" cy="20" r="0.8" fill="white" opacity="0.45"/>
  <circle cx="420" cy="35" r="1" fill="white" opacity="0.4"/>
  <circle cx="520" cy="18" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="570" cy="55" r="1" fill="white" opacity="0.35"/>
  <circle cx="75" cy="75" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="560" cy="90" r="1" fill="white" opacity="0.4"/>
  <circle cx="30" cy="120" r="0.8" fill="white" opacity="0.35"/>
  <circle cx="590" cy="140" r="1" fill="white" opacity="0.3"/>
  <circle cx="50" cy="310" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="555" cy="320" r="1" fill="white" opacity="0.35"/>
  <circle cx="80" cy="370" r="0.8" fill="white" opacity="0.25"/>
  <circle cx="540" cy="380" r="1" fill="white" opacity="0.3"/>

  <!-- Globe glow -->
  <circle cx="300" cy="190" r="150" fill="url(#globeGlow02)"/>

  <!-- Globe circle -->
  <circle cx="300" cy="190" r="148" fill="#071D3A" opacity="0.4"/>
  <circle cx="300" cy="190" r="148" fill="none" stroke="#1FE9E1" stroke-width="1" opacity="0.35"/>

  <!-- Meridians clipped to globe -->
  <g clip-path="url(#globeClip)">
    <ellipse cx="300" cy="190" rx="50" ry="148" fill="none" stroke="#1FE9E1" stroke-width="0.7" opacity="0.2"/>
    <ellipse cx="300" cy="190" rx="100" ry="148" fill="none" stroke="#1FE9E1" stroke-width="0.7" opacity="0.2"/>
    <ellipse cx="300" cy="190" rx="130" ry="148" fill="none" stroke="#1FE9E1" stroke-width="0.5" opacity="0.15"/>
    <!-- Parallels -->
    <line x1="152" y1="130" x2="448" y2="130" stroke="#1FE9E1" stroke-width="0.6" opacity="0.18"/>
    <line x1="152" y1="190" x2="448" y2="190" stroke="#1FE9E1" stroke-width="0.8" opacity="0.25"/>
    <line x1="152" y1="250" x2="448" y2="250" stroke="#1FE9E1" stroke-width="0.6" opacity="0.18"/>
    <line x1="170" y1="90" x2="430" y2="90" stroke="#1FE9E1" stroke-width="0.5" opacity="0.12"/>
    <line x1="170" y1="290" x2="430" y2="290" stroke="#1FE9E1" stroke-width="0.5" opacity="0.12"/>
  </g>

  <!-- Location pins on globe -->
  <!-- Mexico -->
  <g filter="url(#pinGlow)">
    <circle cx="225" cy="175" r="5" fill="#1FE9E1"/>
    <path d="M225,160 L225,175" stroke="#1FE9E1" stroke-width="1.5"/>
    <path d="M220,160 Q225,152 230,160 Z" fill="#1FE9E1"/>
  </g>
  <!-- Spain -->
  <g filter="url(#pinGlow)">
    <circle cx="315" cy="148" r="5" fill="#1FE9E1"/>
    <path d="M315,133 L315,148" stroke="#1FE9E1" stroke-width="1.5"/>
    <path d="M310,133 Q315,125 320,133 Z" fill="#1FE9E1"/>
  </g>
  <!-- New York -->
  <g filter="url(#pinGlow)">
    <circle cx="260" cy="160" r="4" fill="#1FE9E1" opacity="0.8"/>
    <path d="M260,148 L260,160" stroke="#1FE9E1" stroke-width="1.2"/>
    <path d="M256,148 Q260,141 264,148 Z" fill="#1FE9E1" opacity="0.8"/>
  </g>
  <!-- Tokyo area -->
  <g filter="url(#pinGlow)">
    <circle cx="400" cy="162" r="4" fill="#1FE9E1" opacity="0.7"/>
  </g>
  <!-- Brussels/Geneva -->
  <g filter="url(#pinGlow)">
    <circle cx="330" cy="143" r="3" fill="#1FE9E1" opacity="0.75"/>
  </g>

  <!-- Connection arcs between pins -->
  <path d="M225,175 Q280,100 315,148" fill="none" stroke="#1FE9E1" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.6"/>
  <path d="M260,160 Q285,110 315,148" fill="none" stroke="#1FE9E1" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.45"/>
  <path d="M315,148 Q360,130 400,162" fill="none" stroke="#1FE9E1" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Outer orbit ring -->
  <circle cx="300" cy="190" r="168" fill="none" stroke="#1FE9E1" stroke-width="0.5" stroke-dasharray="8,12" opacity="0.2"/>
  <!-- Outer orbit node dots -->
  <circle cx="300" cy="22" r="3" fill="#1FE9E1" opacity="0.4"/>
  <circle cx="300" cy="358" r="3" fill="#1FE9E1" opacity="0.4"/>
  <circle cx="132" cy="190" r="3" fill="#1FE9E1" opacity="0.35"/>
  <circle cx="468" cy="190" r="3" fill="#1FE9E1" opacity="0.35"/>

  <!-- Text bottom -->
  <text x="300" y="348" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="17" fill="white" text-anchor="middle" letter-spacing="1" opacity="0.95">Agenda Internacional</text>
  <text x="300" y="370" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="10" fill="#1FE9E1" text-anchor="middle" letter-spacing="3" opacity="0.75">G7 · G20 · ONU · WEF · OCDE</text>

  <line x1="80" y1="380" x2="520" y2="380" stroke="#1FE9E1" stroke-width="0.8" opacity="0.2" stroke-dasharray="3,5"/>
</svg>
