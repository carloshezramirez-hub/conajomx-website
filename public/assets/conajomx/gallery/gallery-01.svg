<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgG01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071D3A"/>
      <stop offset="100%" stop-color="#0A2D52"/>
    </linearGradient>
    <linearGradient id="stageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A2D52"/>
      <stop offset="100%" stop-color="#071D3A"/>
    </linearGradient>
    <pattern id="hexP01" x="0" y="0" width="40" height="34.6" patternUnits="userSpaceOnUse">
      <polygon points="20,1 38,10.3 38,29 20,38.3 2,29 2,10.3" fill="none" stroke="#1FE9E1" stroke-width="0.4" opacity="0.1"/>
    </pattern>
    <linearGradient id="spotLight" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1FE9E1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1FE9E1" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow01g">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" fill="url(#bgG01)"/>
  <rect width="600" height="400" fill="url(#hexP01)"/>

  <!-- Stage platform -->
  <rect x="80" y="290" width="440" height="18" fill="#0A2D52" rx="2"/>
  <rect x="60" y="308" width="480" height="8" fill="#071D3A" rx="1"/>
  <!-- Stage steps -->
  <rect x="50" y="316" width="500" height="6" fill="#0A2D52" opacity="0.7" rx="1"/>
  <rect x="40" y="322" width="520" height="5" fill="#071D3A" opacity="0.5" rx="1"/>

  <!-- Podium center -->
  <rect x="274" y="255" width="52" height="36" fill="#0A2D52" rx="3"/>
  <rect x="270" y="287" width="60" height="4" fill="#1FE9E1" opacity="0.6" rx="1"/>
  <!-- Microphone suggestion -->
  <circle cx="300" cy="248" r="5" fill="#526173"/>
  <rect x="298.5" y="248" width="3" height="10" fill="#526173"/>

  <!-- People silhouettes at stage -->
  <!-- Speaker at podium -->
  <ellipse cx="300" cy="235" rx="12" ry="14" fill="#0A2D52"/>
  <rect x="290" y="249" width="20" height="32" fill="#0A2D52" rx="2"/>

  <!-- Person left 1 -->
  <ellipse cx="195" cy="262" rx="11" ry="12" fill="#0D2A45" opacity="0.9"/>
  <rect x="186" y="274" width="18" height="28" fill="#0D2A45" opacity="0.9" rx="2"/>
  <!-- Person left 2 -->
  <ellipse cx="228" cy="258" rx="10" ry="11" fill="#0E2E4A" opacity="0.95"/>
  <rect x="220" y="269" width="16" height="30" fill="#0E2E4A" opacity="0.95" rx="2"/>
  <!-- Person left 3 -->
  <ellipse cx="258" cy="265" rx="10" ry="11" fill="#0B2640" opacity="0.85"/>
  <rect x="250" y="276" width="16" height="26" fill="#0B2640" opacity="0.85" rx="2"/>

  <!-- Person right 1 -->
  <ellipse cx="345" cy="260" rx="10" ry="11" fill="#0E2E4A" opacity="0.9"/>
  <rect x="337" y="271" width="16" height="28" fill="#0E2E4A" opacity="0.9" rx="2"/>
  <!-- Person right 2 -->
  <ellipse cx="375" cy="257" rx="11" ry="12" fill="#0D2A45" opacity="0.95"/>
  <rect x="366" y="269" width="18" height="30" fill="#0D2A45" opacity="0.95" rx="2"/>
  <!-- Person right 3 -->
  <ellipse cx="408" cy="263" rx="10" ry="11" fill="#0B2640" opacity="0.85"/>
  <rect x="400" y="274" width="16" height="27" fill="#0B2640" opacity="0.85" rx="2"/>

  <!-- Spotlight effects from above -->
  <polygon points="220,0 120,290 320,290" fill="url(#spotLight)" opacity="0.6"/>
  <polygon points="380,0 280,290 480,290" fill="url(#spotLight)" opacity="0.5"/>

  <!-- Cyan accent lines on stage -->
  <line x1="80" y1="290" x2="520" y2="290" stroke="#1FE9E1" stroke-width="1.5" opacity="0.5"/>

  <!-- Audience dots (background) -->
  <circle cx="100" cy="320" r="3" fill="#0A2D52" opacity="0.8"/>
  <circle cx="130" cy="330" r="3.5" fill="#0A2D52" opacity="0.7"/>
  <circle cx="160" cy="320" r="3" fill="#0A2D52"/>
  <circle cx="190" cy="328" r="3.5" fill="#0A2D52"/>
  <circle cx="220" cy="318" r="3" fill="#0A2D52"/>
  <circle cx="450" cy="322" r="3" fill="#0A2D52" opacity="0.8"/>
  <circle cx="480" cy="330" r="3.5" fill="#0A2D52" opacity="0.7"/>
  <circle cx="510" cy="320" r="3" fill="#0A2D52"/>

  <!-- Floating abstract hex accents top right -->
  <polygon points="520,30 540,41.5 540,64.5 520,76 500,64.5 500,41.5" fill="none" stroke="#1FE9E1" stroke-width="1" opacity="0.4"/>
  <polygon points="555,55 567,61.9 567,75.7 555,82.6 543,75.7 543,61.9" fill="none" stroke="#1FE9E1" stroke-width="0.8" opacity="0.25"/>
  <circle cx="520" cy="53" r="3" fill="#1FE9E1" opacity="0.5"/>

  <!-- Bottom text -->
  <text x="26" y="368" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="18" fill="white" opacity="0.95" letter-spacing="0.5">Líderes en acción</text>
  <text x="26" y="388" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="10" fill="#1FE9E1" opacity="0.7" letter-spacing="2">CONAJOMX · AGENDA NACIONAL</text>

  <!-- Bottom cyan accent bar -->
  <rect x="0" y="395" width="180" height="5" fill="#1FE9E1" opacity="0.4" rx="0"/>
</svg>
