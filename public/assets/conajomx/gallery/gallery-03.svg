<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgG03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5FAFF"/>
      <stop offset="100%" stop-color="#EEF3FB"/>
    </linearGradient>
    <linearGradient id="iconGrad03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071D3A"/>
      <stop offset="100%" stop-color="#0A2D52"/>
    </linearGradient>
    <pattern id="gridPat03" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <line x1="30" y1="0" x2="0" y2="0" stroke="#071D3A" stroke-width="0.3" opacity="0.07"/>
      <line x1="0" y1="0" x2="0" y2="30" stroke="#071D3A" stroke-width="0.3" opacity="0.07"/>
    </pattern>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#071D3A" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="600" height="400" fill="url(#bgG03)"/>
  <rect width="600" height="400" fill="url(#gridPat03)"/>

  <!-- Diagonal accent stripe top right -->
  <polygon points="450,0 600,0 600,150" fill="#D9FFFC" opacity="0.6"/>
  <!-- Diagonal accent bottom left -->
  <polygon points="0,300 150,400 0,400" fill="#D9FFFC" opacity="0.4"/>

  <!-- Central connection/handshake icon -->
  <!-- Left hand/arm -->
  <g filter="url(#cardShadow)">
    <!-- Left circle (person/org) -->
    <circle cx="195" cy="185" r="55" fill="url(#iconGrad03)" opacity="0.92"/>
    <text x="195" y="190" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="13" fill="white" text-anchor="middle" letter-spacing="0.5">EMPRESA</text>

    <!-- Right circle (person/org) -->
    <circle cx="405" cy="185" r="55" fill="#0A2D52" opacity="0.85"/>
    <text x="405" y="190" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="13" fill="white" text-anchor="middle" letter-spacing="0.5">GOBIERNO</text>
  </g>

  <!-- Center connection diamond -->
  <circle cx="300" cy="185" r="28" fill="#1FE9E1" opacity="0.15"/>
  <circle cx="300" cy="185" r="20" fill="#1FE9E1" opacity="0.25"/>
  <circle cx="300" cy="185" r="10" fill="#1FE9E1" opacity="0.9"/>
  <polygon points="300,160 318,185 300,210 282,185" fill="none" stroke="#1FE9E1" stroke-width="1.5" opacity="0.6"/>

  <!-- Connection arms -->
  <line x1="250" y1="185" x2="272" y2="185" stroke="#071D3A" stroke-width="3" opacity="0.6"/>
  <line x1="328" y1="185" x2="350" y2="185" stroke="#071D3A" stroke-width="3" opacity="0.6"/>

  <!-- Network nodes radiating -->
  <circle cx="300" cy="80" r="8" fill="none" stroke="#071D3A" stroke-width="1.5" opacity="0.4"/>
  <circle cx="300" cy="80" r="3" fill="#071D3A" opacity="0.5"/>
  <line x1="300" y1="165" x2="300" y2="88" stroke="#071D3A" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>

  <circle cx="300" cy="290" r="8" fill="none" stroke="#071D3A" stroke-width="1.5" opacity="0.4"/>
  <circle cx="300" cy="290" r="3" fill="#071D3A" opacity="0.5"/>
  <line x1="300" y1="205" x2="300" y2="282" stroke="#071D3A" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>

  <circle cx="130" cy="100" r="6" fill="none" stroke="#1FE9E1" stroke-width="1.2" opacity="0.5"/>
  <circle cx="130" cy="100" r="2.5" fill="#1FE9E1" opacity="0.6"/>
  <line x1="153" y1="145" x2="135" y2="106" stroke="#1FE9E1" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>

  <circle cx="470" cy="100" r="6" fill="none" stroke="#1FE9E1" stroke-width="1.2" opacity="0.5"/>
  <circle cx="470" cy="100" r="2.5" fill="#1FE9E1" opacity="0.6"/>
  <line x1="447" y1="145" x2="465" y2="106" stroke="#1FE9E1" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>

  <circle cx="130" cy="270" r="6" fill="none" stroke="#1FE9E1" stroke-width="1.2" opacity="0.45"/>
  <circle cx="470" cy="270" r="6" fill="none" stroke="#1FE9E1" stroke-width="1.2" opacity="0.45"/>

  <!-- Caption area -->
  <text x="300" y="348" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="17" fill="#071D3A" text-anchor="middle" letter-spacing="0.5">Vinculación Empresarial</text>
  <text x="300" y="368" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="10" fill="#526173" text-anchor="middle" letter-spacing="2.5">CNEM · ALIANZAS ESTRATÉGICAS</text>

  <!-- Bottom accent line -->
  <rect x="180" y="380" width="240" height="2" fill="#1FE9E1" rx="1" opacity="0.5"/>

  <!-- Top left corner mark -->
  <rect x="20" y="20" width="30" height="2" fill="#071D3A" opacity="0.2" rx="1"/>
  <rect x="20" y="20" width="2" height="30" fill="#071D3A" opacity="0.2" rx="1"/>
</svg>
