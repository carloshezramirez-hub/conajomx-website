<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="bgG06" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0A2D52"/>
      <stop offset="100%" stop-color="#071D3A"/>
    </radialGradient>
    <radialGradient id="orbitGlow06" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#1FE9E1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#071D3A" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow06">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow06">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" fill="url(#bgG06)"/>
  <circle cx="300" cy="210" r="200" fill="url(#orbitGlow06)"/>

  <!-- Star field -->
  <circle cx="30" cy="25" r="1.2" fill="white" opacity="0.6" filter="url(#starGlow06)"/>
  <circle cx="85" cy="10" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="145" cy="30" r="1" fill="white" opacity="0.55"/>
  <circle cx="220" cy="18" r="0.8" fill="white" opacity="0.45"/>
  <circle cx="285" cy="8" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="355" cy="22" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="415" cy="12" r="1" fill="white" opacity="0.55"/>
  <circle cx="490" cy="28" r="0.8" fill="white" opacity="0.45"/>
  <circle cx="555" cy="15" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="580" cy="50" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="20" cy="80" r="1" fill="white" opacity="0.45"/>
  <circle cx="575" cy="95" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="15" cy="160" r="1.2" fill="white" opacity="0.4" filter="url(#starGlow06)"/>
  <circle cx="585" cy="170" r="0.8" fill="white" opacity="0.45"/>
  <circle cx="25" cy="260" r="1" fill="white" opacity="0.35"/>
  <circle cx="575" cy="280" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="60" cy="340" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="540" cy="355" r="1" fill="white" opacity="0.35"/>
  <circle cx="100" cy="380" r="0.8" fill="white" opacity="0.25"/>
  <circle cx="500" cy="390" r="1" fill="white" opacity="0.3"/>
  <!-- Extra scattered -->
  <circle cx="170" cy="65" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="430" cy="55" r="0.8" fill="white" opacity="0.35"/>
  <circle cx="130" cy="115" r="0.6" fill="white" opacity="0.3"/>
  <circle cx="460" cy="100" r="0.6" fill="white" opacity="0.3"/>

  <!-- Orbital rings -->
  <!-- Outer orbit -->
  <ellipse cx="300" cy="210" rx="230" ry="90" fill="none" stroke="#1FE9E1" stroke-width="0.8" opacity="0.25" stroke-dasharray="10,8"/>
  <!-- Middle orbit -->
  <ellipse cx="300" cy="210" rx="165" ry="65" fill="none" stroke="#1FE9E1" stroke-width="1" opacity="0.35" stroke-dasharray="8,6"/>
  <!-- Inner orbit -->
  <ellipse cx="300" cy="210" rx="100" ry="40" fill="none" stroke="#1FE9E1" stroke-width="1.2" opacity="0.45" stroke-dasharray="6,4"/>

  <!-- Tilted outer ring (3D effect) -->
  <ellipse cx="300" cy="210" rx="190" ry="140" fill="none" stroke="#1FE9E1" stroke-width="0.6" opacity="0.15" transform="rotate(-20 300 210)"/>
  <ellipse cx="300" cy="210" rx="140" ry="100" fill="none" stroke="#1FE9E1" stroke-width="0.5" opacity="0.12" transform="rotate(20 300 210)"/>

  <!-- Center globe -->
  <circle cx="300" cy="210" r="38" fill="#0A2D52" opacity="0.8"/>
  <circle cx="300" cy="210" r="38" fill="none" stroke="#1FE9E1" stroke-width="1.5" opacity="0.5"/>
  <text x="300" y="215" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="11" fill="#1FE9E1" text-anchor="middle" letter-spacing="1">GLOBAL</text>

  <!-- Orbit nodes -->
  <!-- Outer orbit nodes -->
  <circle cx="530" cy="210" r="8" fill="#071D3A" stroke="#1FE9E1" stroke-width="1.2" opacity="0.9" filter="url(#nodeGlow06)"/>
  <text x="530" y="213" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="7" fill="#1FE9E1" text-anchor="middle">G7</text>

  <circle cx="70" cy="210" r="8" fill="#071D3A" stroke="#1FE9E1" stroke-width="1.2" opacity="0.9" filter="url(#nodeGlow06)"/>
  <text x="70" y="213" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="7" fill="#1FE9E1" text-anchor="middle">G20</text>

  <circle cx="300" cy="120" r="8" fill="#071D3A" stroke="#1FE9E1" stroke-width="1.2" opacity="0.9" filter="url(#nodeGlow06)"/>
  <text x="300" y="123" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="6" fill="#1FE9E1" text-anchor="middle">ONU</text>

  <!-- Middle orbit nodes -->
  <circle cx="465" cy="145" r="7" fill="#071D3A" stroke="#1FE9E1" stroke-width="1" opacity="0.85"/>
  <text x="465" y="148" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="6" fill="#1FE9E1" text-anchor="middle">WEF</text>

  <circle cx="135" cy="275" r="7" fill="#071D3A" stroke="#1FE9E1" stroke-width="1" opacity="0.85"/>
  <text x="135" y="278" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="5.5" fill="#1FE9E1" text-anchor="middle">OCDE</text>

  <!-- Connector lines from center to nodes -->
  <line x1="338" y1="210" x2="492" y2="210" stroke="#1FE9E1" stroke-width="0.5" opacity="0.2" stroke-dasharray="3,4"/>
  <line x1="262" y1="210" x2="108" y2="210" stroke="#1FE9E1" stroke-width="0.5" opacity="0.2" stroke-dasharray="3,4"/>

  <!-- Bottom text -->
  <text x="300" y="335" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="20" fill="white" text-anchor="middle" letter-spacing="1.5" opacity="0.95">Foros Globales</text>
  <text x="300" y="358" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="10" fill="#1FE9E1" text-anchor="middle" letter-spacing="2.5" opacity="0.8">G7 · G20 · OCDE · WEF · ONU</text>
  <text x="300" y="376" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="9" fill="white" text-anchor="middle" letter-spacing="1.5" opacity="0.4">CONAJOMX · AGENDA INTERNACIONAL</text>
</svg>
