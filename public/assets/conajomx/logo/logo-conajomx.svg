<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071D3A"/>
      <stop offset="100%" stop-color="#0A2D52"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1FE9E1"/>
      <stop offset="100%" stop-color="#0fc8c0"/>
    </linearGradient>
  </defs>

  <!-- Hexagon icon -->
  <polygon points="22,8 30,12.5 30,21.5 22,26 14,21.5 14,12.5" fill="none" stroke="url(#hexGrad)" stroke-width="2"/>
  <polygon points="22,12 27,14.75 27,20.25 22,23 17,20.25 17,14.75" fill="url(#hexGrad)" opacity="0.3"/>
  <!-- Inner hex accent -->
  <line x1="22" y1="8" x2="22" y2="26" stroke="#1FE9E1" stroke-width="0.5" opacity="0.4"/>
  <line x1="14" y1="12.5" x2="30" y2="21.5" stroke="#1FE9E1" stroke-width="0.5" opacity="0.4"/>
  <line x1="30" y1="12.5" x2="14" y2="21.5" stroke="#1FE9E1" stroke-width="0.5" opacity="0.4"/>

  <!-- CONAJO part -->
  <text x="40" y="28" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="18" fill="#071D3A" letter-spacing="1.5">CONAJO</text>
  <!-- MX in cyan -->
  <text x="138" y="28" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="18" fill="#1FE9E1" letter-spacing="1.5">MX</text>
  <!-- Thin cyan underline under MX -->
  <rect x="138" y="30" width="30" height="2" fill="#1FE9E1" rx="1"/>

  <!-- Tagline -->
  <text x="40" y="44" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="8" fill="#526173" letter-spacing="0.8">Consejo de Jóvenes Pro México</text>

  <!-- Top accent line -->
  <rect x="40" y="10" width="60" height="1.5" fill="#1FE9E1" rx="1" opacity="0.5"/>
</svg>
